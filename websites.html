<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Websites — Janco Uys</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .websites-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 24px 80px;
        }

        .websites-back {
            position: fixed;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }

        .websites-back:hover { opacity: 0.7; }

        .websites-title {
            font-family: var(--font-head);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--text-1);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .websites-title span { color: var(--accent); }

        .websites-subtitle {
            color: var(--text-2);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 56px;
        }

        .websites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 960px;
        }

        .website-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .website-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
        }

        .website-card-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: var(--bg);
        }

        .website-card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
            transition: transform 0.4s ease;
        }

        .website-card:hover .website-card-preview img {
            transform: scale(1.04);
        }

        .website-card-body {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .website-card-name {
            font-family: var(--font-head);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-1);
        }

        .website-card-arrow {
            color: var(--accent);
            font-size: 1.1rem;
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .website-card:hover .website-card-arrow {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <a href="index.html" class="websites-back">← Back</a>

    <div class="websites-page">
        <p class="section-label" style="text-align:center; margin-bottom: 12px;">Portfolio</p>
        <h1 class="websites-title">Websites I've <span>Built</span></h1>
        <p class="websites-subtitle">A selection of client websites built using WordPress and Wix.</p>

        <div class="websites-grid">
            <a href="https://www.shepstonespa.co.za/" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Shepstone Spa.png" alt="Shepstone Spa">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Shepstone Spa</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
            <a href="https://www.knee.capetown/" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Knee.png" alt="Knee Cape Town">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Knee Cape Town</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
            <a href="https://tapxdev.wixstudio.com/stride" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Stride.png" alt="Stride">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Stride</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
            <a href="https://www.carfox.co.za/" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Carfox.png" alt="Carfox">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Carfox</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
            <a href="https://www.jo-annstrauss.com/" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Jo-Ann.png" alt="Jo-Ann Strauss">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Jo-Ann Strauss</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
            <a href="https://www.masekhaya.co.za/" target="_blank" rel="noopener" class="website-card">
                <div class="website-card-preview">
                    <img src="Screenshots/Masekaya.png" alt="Masekhaya">
                </div>
                <div class="website-card-body">
                    <div class="website-card-name">Masekhaya</div>
                    <div class="website-card-arrow">→</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
